<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GeoIFC Assets Viewer</title>
  </head>
  <body>
    <main class="viewer-shell">
      <section class="viewport" aria-label="IFC 3D viewer">
        <canvas id="viewer-canvas"></canvas>
        <div class="viewport-status" id="viewport-status">Waiting for IFC source</div>
        <button class="view-toggle-btn" id="btn-view-2d" hidden title="Switch to 2D top-down view">2D</button>
      </section>
      <div class="resizer" id="panel-resizer" title="Drag to resize panel"></div>
      <aside class="viewer-panel" aria-label="Element browser">
        <div class="panel-info">
          <span class="label">Source</span>
          <strong id="source-name">No IFC selected</strong>
          <span id="source-kind" hidden></span>
        </div>
        <div class="tree-mode-bar" id="tree-mode-bar" hidden>
          <button class="tree-mode-btn active" id="btn-mode-cat" title="Group by IFC category">Category</button>
          <button class="tree-mode-btn" id="btn-mode-spatial" title="Browse spatial structure (Project → Site → Building → Storey → Elements)" disabled>Spatial</button>
          <button class="tree-mode-btn tree-collapse-btn" id="btn-collapse-tree" title="Collapse all">⊟</button>
          <button class="tree-mode-btn tree-export-btn" id="btn-export" title="Export data">⬇</button>
        </div>
        <div class="export-menu" id="export-menu" hidden>
          <div class="export-group-label">Spatial tree</div>
          <button class="export-item" id="export-spatial-json">JSON</button>
          <div class="export-group-label">Categories</div>
          <button class="export-item" id="export-cat-json">JSON</button>
          <div class="export-group-label">Selected element</div>
          <button class="export-item" id="export-props-json">JSON</button>
          <button class="export-item" id="export-props-csv">CSV</button>
        </div>
        <div class="storey-bar" id="storey-bar" hidden aria-label="Floor / storey filter"></div>
        <div id="element-tree" class="panel-tree" role="tree" aria-label="IFC elements">
          <p class="panel-hint">Load an IFC model to browse elements.</p>
        </div>
        <div id="element-props" class="panel-props" hidden aria-label="Element properties"></div>
        <div class="panel-status">
          <span id="source-status">Idle</span>
        </div>
      </aside>
    </main>
    <script type="module" src="/src/viewer.ts"></script>
  </body>
</html>
